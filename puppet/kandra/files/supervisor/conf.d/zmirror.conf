[program:zmirror]
command=/home/zulip/python-zulip-api/zulip/integrations/zephyr/zephyr_mirror.py --site=https://zephyr-zulip.mit.edu --stamp-path=/home/zulip/ --user=zephyr-mirror-bot@zephyr-zulip.mit.edu --forward-class-messages --log-path=/var/log/zulip/mirror-log --on-startup-command="/home/zulip/python-zulip-api/zulip/integrations/zephyr/zmirror-renew-kerberos" --api-key-file=/home/zulip/python-zulip-api/zulip/integrations/zephyr/mirror.api-key
priority=200                   ; the relative start priority (default 999)
autostart=true                 ; start at supervisord start (default: true)
autorestart=true               ; whether/when to restart (default: unexpected)
stopsignal=TERM                 ; signal used to kill process (default TERM)
stopwaitsecs=30                ; max num secs to wait b4 SIGKILL (default 10)
user=zulip                    ; setuid to this UNIX account to run the program
redirect_stderr=true           ; redirect proc stderr to stdout (default false)
stdout_logfile=/var/log/zulip/zmirror.log         ; stdout log path, NONE for none; default AUTO
environment=HOME="/home/zulip",USER="zulip",PATH="/home/zulip/zmirror-venv/bin:%(ENV_PATH)s"

[program:sync-public-streams]
command=/home/zulip/python-zulip-api/zulip/integrations/zephyr/sync-public-streams --site=https://zephyr-zulip.mit.edu
priority=200                   ; the relative start priority (default 999)
autostart=true                 ; start at supervisord start (default: true)
autorestart=true               ; whether/when to restart (default: unexpected)
stopsignal=TERM                 ; signal used to kill process (default TERM)
stopwaitsecs=30                ; max num secs to wait b4 SIGKILL (default 10)
user=zulip                    ; setuid to this UNIX account to run the program
redirect_stderr=true           ; redirect proc stderr to stdout (default false)
stdout_logfile=/var/log/zulip/sync-public-streams.log         ; stdout log path, NONE for none; default AUTO
environment=HOME="/home/zulip",PATH="/home/zulip/zmirror-venv/bin:%(ENV_PATH)s",ZULIP_CONFIG="/home/zulip/python-zulip-api/zulip/integrations/zephyr/public-streams.zuliprc"
